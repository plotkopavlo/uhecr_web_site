<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040a16;
      color: #c8d8ee;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.75;
      font-size: 1.02rem;
    }
    header {
      border-bottom: 1px solid rgba(90, 140, 210, 0.22);
      background: rgba(2, 6, 14, 0.6);
    }
    .header-inner {
      max-width: 780px; margin: 0 auto;
      padding: 18px 20px;
      display: flex; align-items: baseline; flex-wrap: wrap; gap: 14px 28px;
    }
    .brand {
      font-weight: 100; font-size: 1.5rem;
      letter-spacing: 0.4em; color: #fff;
      text-decoration: none;
      text-shadow: 0 0 24px rgba(80,160,255,0.8);
    }
    nav.site { display: flex; flex-wrap: wrap; gap: 4px 20px; }
    nav.site a {
      color: rgba(150, 205, 255, 0.75);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    nav.site a:hover { color: #fff; }
    main {
      max-width: 780px; margin: 0 auto;
      padding: 44px 20px 70px;
    }
    h1 {
      font-weight: 200; font-size: 2rem;
      color: #fff; letter-spacing: 0.04em;
      margin-bottom: 26px;
    }
    h2 {
      font-weight: 300; font-size: 1.35rem;
      color: #e6f0ff;
      margin: 38px 0 14px;
      border-bottom: 1px solid rgba(90, 140, 210, 0.18);
      padding-bottom: 8px;
    }
    p { margin: 14px 0; }
    a { color: #7db8ff; }
    a:hover { color: #b8dcff; }
    ul, ol { margin: 14px 0 14px 26px; }
    li { margin: 6px 0; }
    strong { color: #eef5ff; }
    em { color: #d8e6f8; }
    blockquote {
      border-left: 3px solid rgba(120, 180, 255, 0.4);
      padding: 4px 18px; margin: 18px 0;
      color: rgba(190, 212, 240, 0.85);
      background: rgba(30, 60, 110, 0.12);
    }
    code {
      font-family: 'Courier New', monospace;
      background: rgba(60, 110, 180, 0.15);
      padding: 1px 6px; border-radius: 3px;
      font-size: 0.92em;
    }
    footer {
      border-top: 1px solid rgba(90, 140, 210, 0.18);
      text-align: center;
      padding: 26px 20px 34px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: rgba(110, 160, 220, 0.45);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="/">UHECR</a>
      <nav class="site">
        <a href="/what-are-uhecrs/">What are UHECRs?</a>
        <a href="/detection/">Detection</a>
        <a href="/experiments/">Experiments</a>
        <a href="/open-questions/">Open questions</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; 2026 Pavlo Plotko &mdash; created with Claude &mdash; uhecrs.com
  </footer>
</body>
</html>
